<!DOCTYPE html>
<html>
<head>
    <title>Truck Tracking Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url("https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,15,25,0.75);
            z-index: -1;
        }

        .header {
            text-align: center;
            padding: 18px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6f00, #1976d2);
        }

        .panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 15px;
        }

        .card {
            background: rgba(255,255,255,0.10);
            padding: 15px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            width: 260px;
        }

        .card h3 {
            text-align: center;
            margin: 0 0 10px;
            color: #ffb300;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 10px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .start {
            background: linear-gradient(45deg,#00c853,#64dd17);
        }

        .dest {
            background: linear-gradient(45deg,#ff6f00,#ff9800);
        }

        .mapbox {
            margin: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
        }

        .dashboard {
            margin: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.10);
            border-radius: 16px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-weight: bold;
        }

        .green { color: #00e676; }
        .red { color: #ff5252; }
        .orange { color: #ffb300; }
    </style>
</head>

<body>

<div class="header">🚚 TRANSPORT VEHICLE MONITORING </div>

<!-- CONTROLS -->
<div class="panel">

    <div class="card">
        <h3>🚀 Start Tracking</h3>
        <button class="start" onclick="startTracking()">START GPS</button>
    </div>

    <div class="card">
        <h3>🎯 Destination</h3>
        <input id="lat" placeholder="Latitude">
        <input id="lng" placeholder="Longitude">
        <button class="dest" onclick="setDestination()">SET DEST</button>
    </div>

</div>

<!-- MAP -->
<div class="mapbox">
    <h3>📍 Live Truck Map</h3>
    <div id="map" style="height: 400px; border-radius: 12px;"></div>
</div>

<!-- STATUS -->
<div class="dashboard">
    <div class="row">🚦 Status: <span id="status" class="orange">Idle</span></div>
    <div class="row">🧭 Heading: <span id="heading">--</span></div>
    <div class="row">📡 Speed: <span id="speed">--</span></div>
    <div class="row">⚠️ Accident: <span id="accident" class="green">No</span></div>
</div>

<script>

let map;
let truckMarker;
let destMarker;
let lastPos = null;
let destination = null;

/* INIT MAP */
function initMap(lat = 13.0827, lng = 80.2707) {

    map = L.map('map').setView([lat, lng], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    truckMarker = L.marker([lat, lng]).addTo(map)
        .bindPopup("🚚 Truck Location")
        .openPopup();
}

/* SET DESTINATION */
function setDestination() {

    const lat = parseFloat(document.getElementById("lat").value);
    const lng = parseFloat(document.getElementById("lng").value);

    if (isNaN(lat) || isNaN(lng)) {
        alert("Enter valid coordinates");
        return;
    }

    destination = { lat, lng };

    if (destMarker) destMarker.remove();

    destMarker = L.marker([lat, lng]).addTo(map)
        .bindPopup("🎯 Destination")
        .openPopup();

    alert("Destination Set ✔");
}

/* START GPS */
function startTracking() {

    if (!navigator.geolocation) {
        alert("GPS not supported");
        return;
    }

    navigator.geolocation.watchPosition(pos => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const speed = pos.coords.speed ? pos.coords.speed.toFixed(2) : 0;

        document.getElementById("speed").innerText = speed + " m/s";

        document.getElementById("status").innerText =
            speed == 0 ? "Stopped" : "Moving";

        document.getElementById("status").className =
            speed == 0 ? "red" : "green";

        if (lastPos) {
            const angle = Math.atan2(lat - lastPos.lat, lng - lastPos.lng) * 180 / Math.PI;
            document.getElementById("heading").innerText = Math.round(angle) + "°";
        }

        lastPos = { lat, lng };

        /* MOVE TRUCK ON MAP */
        if (map && truckMarker) {
            const newLatLng = [lat, lng];
            truckMarker.setLatLng(newLatLng);
            map.setView(newLatLng);
        }

        /* ARRIVAL CHECK */
        if (destination) {
            const dist =
                Math.sqrt(
                    Math.pow(destination.lat - lat, 2) +
                    Math.pow(destination.lng - lng, 2)
                );

            if (dist < 0.001) {
                document.getElementById("status").innerText = "Arrived";
                document.getElementById("status").className = "green";
            }
        }

        document.getElementById("accident").innerText = "No";

    }, err => {
        alert(err.message);
    }, {
        enableHighAccuracy: true
    });
}

/* START MAP ON LOAD */
initMap();

</script>

</body>
</html>
